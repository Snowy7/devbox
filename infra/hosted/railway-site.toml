[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/hosted/site.Dockerfile"
watchPatterns = [
  "apps/site/**",
  "packages/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
  "infra/hosted/site.Dockerfile",
  "infra/hosted/railway-site.toml",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
