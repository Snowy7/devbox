[area]
name = "loom"
status = "active-home"
description = "Source-control and sync engine for shared folders."

[[crate]]
name = "loom-core"
path = "crates/loom-core"
owns = ["objects", "file versions", "folder revisions", "checkpoints", "pins", "cursors", "shared folders"]

[[crate]]
name = "loom-store"
path = "crates/loom-store"
owns = ["object store", "local metadata", "retention"]

[[crate]]
name = "loom-worktree"
path = "crates/loom-worktree"
owns = ["shared-folder scanning", "materialization", "restore safety"]

[[crate]]
name = "loom-pack"
path = "crates/loom-pack"
owns = ["pack format", "import", "export"]

[[crate]]
name = "loom-sync"
path = "crates/loom-sync"
owns = ["remote trait", "local filesystem remote", "reconciliation", "sync", "clone"]

[[crate]]
name = "loom-daemon"
path = "crates/loom-daemon"
owns = ["background capture", "background sync"]

[[crate]]
name = "loom-cli"
path = "crates/loom-cli"
owns = ["human Loom command surface"]

[[crate]]
name = "loom-git"
path = "crates/loom-git"
owns = ["Git compatibility analysis", ".git protection"]
